name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: macos-26
    permissions:
      contents: read
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Resolve llama cache key
        id: llama-cache-key
        shell: bash
        run: |
          set -euo pipefail
          llama_ref="$(git ls-tree HEAD vendor/llama.cpp | awk '{print $3}')"
          echo "ref=${llama_ref:-missing}" >> "$GITHUB_OUTPUT"

      - name: Install CI tools
        run: brew install just cmake openssl@3

      - name: Restore llama build cache
        id: llama-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            vendor/llama-build
            vendor/llama-install
          key: llama-build-${{ runner.os }}-${{ steps.llama-cache-key.outputs.ref }}-${{ hashFiles('scripts/build-llama.sh', 'scripts/patch-llama-openssl.sh') }}

      - name: Build llama.cpp
        if: steps.llama-cache.outputs.cache-hit != 'true'
        run: just build-llama

      - name: Save llama build cache
        if: steps.llama-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            vendor/llama-build
            vendor/llama-install
          key: ${{ steps.llama-cache.outputs.cache-primary-key }}

      - name: Build & Test
        run: just ci
