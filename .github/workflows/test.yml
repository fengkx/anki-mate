name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: macos-26
    permissions:
      contents: read
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install CI tools
        run: brew install just cmake openssl@3

      - name: Build llama.cpp
        run: just build-llama

      - name: Build & Test
        run: just ci
